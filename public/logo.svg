<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="#0a0a0a"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="192" stroke="#39FF14" stroke-width="5"/>
  <!-- Inner ring -->
  <circle cx="200" cy="200" r="148" stroke="#39FF14" stroke-width="2.5"/>

  <defs>
    <!-- Top arc at midpoint of ring band: r=(192+148)/2=170 -->
    <path id="topArc" d="M 30,200 A 170,170 0 0,1 370,200"/>
    <!-- Bottom arc at inner ring: r=148 -->
    <path id="botArc" d="M 52,200 A 148,148 0 0,0 348,200"/>
  </defs>

  <!-- Stars at ring band midpoint (r=170) at equator -->
  <text x="28" y="209" fill="#39FF14" font-size="22" text-anchor="middle" font-family="sans-serif">★</text>
  <text x="372" y="209" fill="#39FF14" font-size="22" text-anchor="middle" font-family="sans-serif">★</text>

  <!-- Top arc text: UNCONVENTIONAL -->
  <text
    fill="#39FF14"
    font-size="26"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    letter-spacing="3.5"
  >
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">UNCONVENTIONAL</textPath>
  </text>

  <!-- Large U monogram -->
  <text
    x="200" y="282"
    fill="#39FF14"
    font-size="180"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    text-anchor="middle"
  >U</text>

  <!-- Bottom arc text: GROUP -->
  <text
    fill="#39FF14"
    font-size="30"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    letter-spacing="14"
  >
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">GROUP</textPath>
  </text>

  <!-- Decorative inner arcs below U -->
  <path d="M 105,322 A 102,30 0 0,0 295,322" stroke="#39FF14" stroke-width="2.5" opacity="0.5"/>
  <path d="M 120,340 A 86,24 0 0,0 280,340" stroke="#39FF14" stroke-width="2" opacity="0.35"/>
</svg>
